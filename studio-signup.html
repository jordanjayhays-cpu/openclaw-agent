<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner With Us — Massage Pass</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .wrap{width:100%;max-width:560px}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px;position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899)}
    h1{font-size:28px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{color:#666;font-size:14px;margin-bottom:28px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .full{grid-column:1/-1}
    label{display:block;font-size:12px;color:#888;font-weight:600;letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase}
    input,select,textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;outline:none;transition:border .2s;resize:vertical;font-family:inherit}
    input::placeholder,textarea::placeholder{color:#444}
    input:focus,select:focus,textarea:focus{border-color:#6366f1}
    select option{background:#1a1a2e}
    textarea{min-height:80px}
    .btn{width:100%;padding:14px;background:#6366f1;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
    .btn:hover{background:#4f46e5;transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .msg{padding:14px 16px;border-radius:10px;font-size:14px;font-weight:500;margin-bottom:18px;display:none}
    .msg.ok{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#22c55e;display:block}
    .msg.err{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#ef4444;display:block}
    .badge{background:rgba(99,102,241,0.15);color:#818cf8;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:16px}
    .footer{text-align:center;margin-top:16px;font-size:12px;color:#444}
    @media(max-width:500px){.row{grid-template-columns:1fr}.card{padding:28px 24px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="badge">For Studio Owners</div>
    <h1>List Your Studio</h1>
    <p class="sub">Free forever. AI receptionist handles bookings 24/7.</p>

    <div id="msg" class="msg"></div>

    <form id="form" onsubmit="submitForm(event)">
      <div class="row">
        <div class="full">
          <label>Studio Name *</label>
          <input name="studio_name" required placeholder="e.g. The Fix Room">
        </div>
        <div class="full">
          <label>Contact Name</label>
          <input name="contact_name" placeholder="e.g. María García">
        </div>
        <div class="full">
          <label>Email *</label>
          <input name="email" type="email" required placeholder="studio@email.com">
        </div>
        <div class="full">
          <label>Phone / WhatsApp *</label>
          <input name="phone" type="tel" required placeholder="+34 600 000 000">
        </div>
        <div class="full">
          <label>Full Address *</label>
          <input name="address" id="addr" required placeholder="Calle Example 1, Madrid 28001">
        </div>
        <div class="full">
          <label>District / Neighborhood</label>
          <input name="district" id="dist" placeholder="e.g. Chamberí, Chueca, Sol">
        </div>
        <div class="full">
          <label>Services You Offer</label>
          <input name="services" placeholder="e.g. Thai Massage, Deep Tissue, Couples">
        </div>
        <div class="full">
          <label>Anything else?</label>
          <textarea name="notes" placeholder="Opening hours, pricing, what makes you different..."></textarea>
        </div>
      </div>
      <button type="submit" class="btn" id="btn">Send Application →</button>
    </form>

    <p class="footer">We respond within 24 hours. No spam, ever.</p>
  </div>
</div>

<script>
const SB_U = 'https://jglftdstrowwckwqmpue.supabase.co';
const SB_K = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbGZ0ZHN0cm93d2Nrd3FtcHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5ODA2OTgsImV4cCI6MjA5MjU1NjY5OH0.BoqLEbyFqLl9hJ7bYq1WIEMlDRcqPck2EnZteA-LKgg';
const WEBHOOK = 'https://neuromatch.app.n8n.cloud/webhook/massage-pass-new-partner';

function genUUID(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0;
    return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}

function extractDistrict(addr){
  if(!addr) return null;
  const districts = ['Centro','Sol','Chamberí','Chueca','Salamanca','Retiro','Moncloa','Arganzuela','Lavapiés','Malasaña','Tetuán','Chamartín','Paseo de La Habana','Alonso Martínez','Gran Vía','Callao','Noviciado','Bilbao','Guzmán el Bueno','Alameda','Atocha','Barrio de Salamanca','Mirasierra','Las Tablas'];
  for(const d of districts){
    if(addr.toLowerCase().includes(d.toLowerCase())) return d;
  }
  return null;
}

async function submitForm(e){
  e.preventDefault();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  const form = document.getElementById('form');
  const fd = new FormData(form);
  const data = Object.fromEntries(fd.entries());

  // Auto-detect district from address
  if(!data.district && data.address){
    const detected = extractDistrict(data.address);
    if(detected) data.district = detected;
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';
  msg.className = 'msg';
  msg.textContent = '';
  msg.style.display = 'none';

  const id = genUUID();
  const payload = {
    id,
    studio_name: data.studio_name,
    contact_name: data.contact_name || null,
    email: data.email,
    phone: data.phone,
    address: data.address,
    district: data.district || null,
    city: 'Madrid',
    services: data.services || null,
    notes: data.notes || null,
    status: 'pending',
    source: 'partner-signup-form'
  };

  let ok = true;
  let errMsg = '';

  // 1. Save to Supabase
  try {
    const r = await fetch(SB_U + '/rest/v1/partners', {
      method: 'POST',
      headers: {
        apikey: SB_K,
        Authorization: 'Bearer ' + SB_K,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(payload)
    });
    if(!r.ok){
      const err = await r.json().catch(()=>({}));
      // Duplicate = already submitted, not an error
      if(r.status === 409){
        // already exists — that's fine
      } else {
        ok = false;
        errMsg = 'Supabase error: ' + (err.message || r.statusText || 'unknown');
      }
    }
  } catch(ex){
    ok = false;
    errMsg = 'Network error reaching Supabase. Try again.';
  }

  // 2. Fire n8n webhook (for Telegram alert — async, ignore errors)
  try {
    fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        studio_name: data.studio_name,
        contact_name: data.contact_name,
        email: data.email,
        phone: data.phone,
        address: data.address,
        district: data.district,
        services: data.services,
        notes: data.notes,
        source: 'partner-signup-form',
        submitted_at: new Date().toISOString()
      })
    });
  } catch(_){}

  btn.disabled = false;
  btn.textContent = 'Send Application →';

  if(ok){
    msg.className = 'msg ok';
    msg.textContent = '✅ Application sent! We\'ll be in touch within 24 hours.';
    form.reset();
  } else {
    msg.className = 'msg err';
    msg.textContent = errMsg || 'Something went wrong. Please try again.';
  }
}
</script>
</body>
</html>
