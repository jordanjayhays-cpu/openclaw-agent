<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>OpenClaw — AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #22c55e;
      --accent-dim: #16a34a;
      --text: #f0f0f0;
      --text-muted: #888;
      --user-bubble: #1a3a2a;
      --bot-bubble: #1a1a1a;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      font-size: 1.6rem;
      line-height: 1;
    }
    .header-text h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }
    .header-text p {
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin-left: auto;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message.user .avatar { background: var(--accent-dim); }
    .message.bot  .avatar { background: var(--surface2); border: 1px solid var(--border); }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 0.93rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid #2d5a3d;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }
    .typing .bubble span {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing .bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing .bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      margin: auto;
      padding: 2rem;
    }
    .welcome .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .welcome h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .welcome p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }

    /* ── Input area ── */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.93rem;
      padding: 11px 15px;
      resize: none;
      outline: none;
      max-height: 160px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #000;
      font-size: 1.1rem;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #send-btn:hover:not(:disabled) { background: #16a34a; }
    #send-btn:active:not(:disabled) { transform: scale(0.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; color: var(--text-muted); }

    .hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Error toast ── */
    #error-toast {
      display: none;
      background: #3b1a1a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">🦞</div>
    <div class="header-text">
      <h1>OpenClaw</h1>
      <p>AI ASSISTANT · ONLINE</p>
    </div>
    <div class="status-dot"></div>
  </header>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="icon">🦞</div>
      <h2>Hey, I'm OpenClaw</h2>
      <p>Your AI assistant, ready to help.<br>Ask me anything to get started.</p>
    </div>
  </div>

  <div class="input-area">
    <div id="error-toast"></div>
    <div class="input-row">
      <textarea
        id="input"
        rows="1"
        placeholder="Message OpenClaw…"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" title="Send (Enter)">➤</button>
    </div>
    <div class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const welcomeEl  = document.getElementById('welcome');
  const errorToast = document.getElementById('error-toast');

  // Conversation history sent to the server
  const history = [];

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // ── Send on Enter (Shift+Enter = newline) ─────────────────────────────────
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showError(msg) {
    errorToast.textContent = '⚠️ ' + msg;
    errorToast.style.display = 'block';
    setTimeout(() => { errorToast.style.display = 'none'; }, 6000);
  }

  function appendMessage(role, text) {
    if (welcomeEl) welcomeEl.remove();

    const wrap = document.createElement('div');
    wrap.className = 'message ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🦞';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message bot typing';
    wrap.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🦞';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function setLoading(loading) {
    sendBtn.disabled = loading;
    inputEl.disabled = loading;
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Reset input
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Show user message
    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    setLoading(true);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok || data.error) {
        showError(data.error || 'Something went wrong. Please try again.');
      } else {
        appendMessage('bot', data.reply);
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch (err) {
      removeTyping();
      showError('Network error — could not reach the server.');
    } finally {
      setLoading(false);
      inputEl.focus();
    }
  }

  // Focus input on load
  inputEl.focus();
</script>
</body>
</html>
