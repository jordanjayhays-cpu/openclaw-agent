<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Mission Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #ffffff;
    }
    .subtitle {
      font-size: 1.2rem;
      color: #22c55e;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }
    .status-box {
      background: #1a1a1a;
      border: 1px solid #22c55e;
      border-radius: 12px;
      padding: 1.5rem 2.5rem;
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .status-text {
      font-size: 1rem;
      color: #cccccc;
    }
  </style>
</head>
<body>
  <h1>Mission Control</h1>
  <div class="subtitle">Dashboard Online</div>
  <div class="status-box">
    <span class="dot"></span>
    <span class="status-text">All systems operational</span>
  </div>
</body>
</html>
