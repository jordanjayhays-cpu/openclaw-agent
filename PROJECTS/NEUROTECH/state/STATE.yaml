# Thumbnail design system
thumbnail_system:
  primary_colors:
    - Deep space black (#0a0a0f)
    - Electric cyan (#00d4ff)
    - Neon purple (#b967ff)
    - Magenta (#ff00aa)
  accent_colors:
    - Warning red (#ff3333)
    - Gold (#ffd700)
    - Clinical green (#00ff88)
  common_elements:
    - Brain imagery (MRI, CT scans, illustrated)
    - Circuit board patterns
    - AI face overlays
    - Neon glow effects
    - Dark atmospheric backgrounds
  text_rules:
    - Max 3-5 words visible
    - ALL CAPS primary text
    - High contrast against background
    - Font: bold sans-serif (Impact-style or Roboto Black)
    - Leave top 15% clear (YouTube UI)

