<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommitmentClock</title>
  <style>
    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --accent: #7c6fff;
      --accent-glow: rgba(124, 111, 255, 0.2);
      --success: #3ecf8e;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 560px; margin: 0 auto; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #b0a0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .streaks {
      display: flex;
      gap: 1rem;
    }

    .streak-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .streak-badge span { color: var(--accent); font-weight: 700; }

    .day-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .day-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
    }

    .day-nav button:hover { background: var(--border); }

    .day-label {
      font-weight: 600;
      font-size: 1rem;
      min-width: 180px;
      text-align: center;
    }

    .win-rate {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .win-rate .wr-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .win-rate .wr-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .add-commitment {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .add-commitment input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-commitment input:focus { border-color: var(--accent); }

    .add-commitment button {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: opacity 0.15s;
    }

    .add-commitment button:hover { opacity: 0.85; }

    .commitment-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .commitment-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.15s;
    }

    .commitment-item.done {
      opacity: 0.5;
      text-decoration: line-through;
      color: var(--muted);
    }

    .commitment-item.done .item-checkbox {
      background: var(--success);
      border-color: var(--success);
    }

    .commitment-item.done .item-checkbox::after {
      opacity: 1;
    }

    .item-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 5px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .item-checkbox::after {
      content: '✓';
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .item-text { flex: 1; font-size: 0.95rem; }

    .item-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
      opacity: 0;
    }

    .commitment-item:hover .item-delete { opacity: 1; }
    .item-delete:hover { color: var(--danger); }

    .category-tag {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .tag-work { background: rgba(124, 111, 255, 0.2); color: #a090ff; }
    .tag-health { background: rgba(62, 207, 142, 0.15); color: var(--success); }
    .tag-project { background: rgba(255, 200, 80, 0.15); color: #ffc850; }
    .tag-life { background: rgba(80, 180, 220, 0.15); color: #50b4dc; }
    .tag-default { background: rgba(255, 255, 255, 0.08); color: var(--muted); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 2rem;
      font-size: 0.9rem;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 1rem 0 0.5rem;
      display: none;
    }

    .today-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .stat-card.wins .stat-value { color: var(--success); }
    .stat-card.missed .stat-value { color: var(--danger); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>CommitmentClock</h1>
    <div class="streaks">
      <div class="streak-badge">🔥 <span id="dayStreak">0</span>d</div>
      <div class="streak-badge">⭐ <span id="weekStreak">0</span>w</div>
    </div>
  </header>

  <div class="day-nav">
    <button onclick="changeDay(-1)">←</button>
    <span class="day-label" id="dayLabel">Today</span>
    <button onclick="changeDay(1)">→</button>
  </div>

  <div class="today-stats">
    <div class="stat-card">
      <div class="stat-value" id="completedCount">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat-card wins">
      <div class="stat-value" id="winRate">0%</div>
      <div class="stat-label">Win Rate</div>
    </div>
    <div class="stat-card missed">
      <div class="stat-value" id="missedCount">0</div>
      <div class="stat-label">Missed</div>
    </div>
  </div>

  <div class="add-commitment">
    <input type="text" id="newInput" placeholder="Add a commitment for today..." onkeydown="if(event.key==='Enter')addCommitment()">
    <button onclick="addCommitment()">Add</button>
  </div>

  <div id="commitmentList"></div>
</div>

<script>
const STORAGE_KEY = 'commitmentClock';
const CATEGORIES = ['work', 'health', 'project', 'life'];
const TAGS = {
  work: 'tag-work',
  health: 'tag-health',
  project: 'tag-project',
  life: 'tag-life'
};
const TAG_LABELS = { work: 'Work', health: 'Health', project: 'Project', life: 'Life' };

let currentOffset = 0;
let commitments = [];

function getDateKey(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0, 10);
}

function getDayLabel(offset) {
  if (offset === 0) return 'Today';
  if (offset === -1) return 'Yesterday';
  if (offset === 1) return 'Tomorrow';
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    commitments = raw ? JSON.parse(raw) : {};
  } catch(e) { commitments = {}; }
}

function saveAll() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(commitments));
}

function getDayCommitments(dateKey) {
  if (!commitments[dateKey]) commitments[dateKey] = [];
  return commitments[dateKey];
}

function inferCategory(text) {
  const lower = text.toLowerCase();
  if (/gym|workout|running|yoga|sleep|eat|health|meditat/.test(lower)) return 'health';
  if (/pisco|comare|dealsmap|massage|pk|music|song|release|outreach|email|lead|client/.test(lower)) return 'project';
  if (/family|friend|date|social|chore|clean|errand|call/.test(lower)) return 'life';
  return null;
}

function addCommitment() {
  const input = document.getElementById('newInput');
  const text = input.value.trim();
  if (!text) return;
  const dateKey = getDateKey(currentOffset);
  const category = inferCategory(text);
  getDayCommitments(dateKey).push({
    id: Date.now(),
    text,
    done: false,
    category
  });
  input.value = '';
  saveAll();
  render();
}

function toggle(id) {
  const list = getDayCommitments(getDateKey(currentOffset));
  const item = list.find(c => c.id === id);
  if (item) item.done = !item.done;
  saveAll();
  render();
}

function deleteItem(id) {
  const list = getDayCommitments(getDateKey(currentOffset));
  const idx = list.findIndex(c => c.id === id);
  if (idx > -1) list.splice(idx, 1);
  saveAll();
  render();
}

function changeDay(delta) {
  const target = currentOffset + delta;
  const today = new Date();
  today.setHours(0,0,0,0);
  const check = new Date(today);
  check.setDate(today.getDate() + target);
  if (check < new Date('2026-01-01')) return;
  currentOffset = target;
  render();
}

function computeStreaks() {
  let dayStreak = 0;
  let weekStreak = 0;
  const today = new Date();

  // Day streak: consecutive days with 100% completion
  for (let i = 0; i <= 365; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    const list = commitments[key] || [];
    if (list.length === 0) break;
    const done = list.filter(c => c.done).length;
    if (done === list.length) dayStreak++;
    else break;
  }

  // Week streak: consecutive weeks where average win rate >= 80%
  for (let w = 0; w <= 52; w++) {
    let total = 0, done = 0;
    for (let d = 0; d < 7; d++) {
      const date = new Date(today);
      date.setDate(today.getDate() - (w * 7 + d));
      const key = date.toISOString().slice(0, 10);
      const list = commitments[key] || [];
      total += list.length;
      done += list.filter(c => c.done).length;
    }
    if (total === 0) break;
    const wr = done / total;
    if (wr >= 0.8) weekStreak++;
    else break;
  }

  return { dayStreak, weekStreak };
}

function render() {
  const dateKey = getDateKey(currentOffset);
  const list = getDayCommitments(dateKey);

  document.getElementById('dayLabel').textContent = getDayLabel(currentOffset);

  const total = list.length;
  const done = list.filter(c => c.done).length;
  const wr = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('completedCount').textContent = done;
  document.getElementById('winRate').textContent = total > 0 ? wr + '%' : '—';
  document.getElementById('missedCount').textContent = total > 0 ? total - done : 0;

  const progress = document.querySelector('.progress-fill');
  if (!document.querySelector('.progress-bar')) {
    const bar = document.createElement('div');
    bar.className = 'progress-bar';
    bar.innerHTML = '<div class="progress-fill" style="width:0%"></div>';
    document.querySelector('.win-rate').appendChild(bar);
  }
  document.querySelector('.progress-fill').style.width = (total > 0 ? wr : 0) + '%';

  const { dayStreak, weekStreak } = computeStreaks();
  document.getElementById('dayStreak').textContent = dayStreak;
  document.getElementById('weekStreak').textContent = weekStreak;

  const el = document.getElementById('commitmentList');
  if (list.length === 0) {
    el.innerHTML = '<div class="empty-state">No commitments yet.<br>Add one above to get started.</div>';
    return;
  }

  const pending = list.filter(c => !c.done);
  const completed = list.filter(c => c.done);

  el.innerHTML = '';
  if (pending.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'To Do';
    el.appendChild(lbl);
  }
  pending.forEach(c => appendItem(c));
  if (completed.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'Done';
    lbl.style.display = 'block';
    el.appendChild(lbl);
  }
  completed.forEach(c => appendItem(c));
}

function appendItem(c) {
  const div = document.createElement('div');
  div.className = 'commitment-item' + (c.done ? ' done' : '');
  const tag = c.category
    ? `<span class="category-tag ${TAGS[c.category]}">${TAG_LABELS[c.category]}</span>`
    : '';
  div.innerHTML = `
    <div class="item-checkbox" onclick="toggle(${c.id})"></div>
    <span class="item-text">${escapeHtml(c.text)}</span>
    ${tag}
    <button class="item-delete" onclick="deleteItem(${c.id})">✕</button>
  `;
  document.getElementById('commitmentList').appendChild(div);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
loadAll();
render();
</script>
</body>
</html>
